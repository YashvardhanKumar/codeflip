log_format customformat '$remote_addr - $remote_user [$time_local] '
'"$request" $status $body_bytes_sent '
'"$http_referer"';

# Use ALB's X-Forwarded-Proto when available, fallback to $scheme
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name codeflip.co.in;
    return 301 $forwarded_proto://www.codeflip.co.in$request_uri;
}

server {
    listen 80;

    # Respond to www and localhost
    server_name www.codeflip.co.in localhost 127.0.0.1;

    access_log /dev/stdout customformat;
    client_max_body_size 100M;

    # Docker internal DNS resolver with 5s TTL cache
    resolver 127.0.0.11 valid=5s;

    location /api/ {
        set $upstream_api "http://api:8000";
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;

        # All proxy headers must be in this block — Nginx does NOT inherit
        # proxy_set_header from the server context when a location defines any.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Accel-Buffering no;
    }

    location /admin/ {
        set $upstream_admin "http://api:8000";
        proxy_pass $upstream_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /media/ {
        alias /mediafiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        set $upstream_web "http://web:3000";
        proxy_pass $upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
