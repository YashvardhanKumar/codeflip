log_format customformat '$remote_addr - $remote_user [$time_local] '
'"$request" $status $body_bytes_sent '
'"$http_referer"';

server {
    listen 80;

    # Respond to both domain names and localhost
    server_name codeflip.co.in www.codeflip.co.in localhost 127.0.0.1;

    access_log /dev/stdout customformat;
    client_max_body_size 100M;

    # Security headers for proxied environments (Cloudflare)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass "http://api:8000";
        proxy_http_version 1.1;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
        proxy_set_header X-Accel-Buffering no;
    }

    location /admin/ {
        proxy_pass http://api:8000;
    }

    location /media/ {
        alias /mediafiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass "http://web:3000";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
