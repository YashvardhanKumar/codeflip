services:
  nginx:
    image: nginx:alpine
    container_name: nginx_prod
    restart: always
    environment:
      NGINX_ENTRYPOINT_QUIET_LOGS: 1
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - static_data:/staticfiles
      - media_data:/mediafiles
    ports:
      - 80:80
    depends_on:
      - api
      - web
    networks:
      - app-network

  api:
    container_name: api_prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    env_file:
      - ./api/.env
    restart: always
    depends_on:
      - cdb
      - redis
    volumes:
      - static_data:/home/codeflip/api/static
      - media_data:/home/codeflip/api/media
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network

  worker:
    container_name: celery_worker_prod
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    command: celery -A apps worker --loglevel=info
    env_file:
      - ./api/.env
    depends_on:
      - cdb
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network

  web:
    container_name: web_prod
    build:
      context: ./web
      dockerfile: Dockerfile.prod
    environment:
      NODE_ENV: production
    restart: always
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis_prod
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app-network

  cdb:
    image: postgres:16-alpine
    container_name: postgresql_prod
    restart: always
    ports:
      - 5432:5432
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: admin
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    networks:
      - app-network

volumes:
  pg_data:
  redis_data:
  static_data:
  media_data:

networks:
  app-network:
    driver: bridge
