repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        args: [--config, api/pyproject.toml]
        files: ^api/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^web/
        additional_dependencies:
          - prettier@3.2.0

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.11.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c "export PATH=$HOME/.local/bin:$HOME/.bun/bin:$PATH && cd api && export DJANGO_SETTINGS_MODULE=apps.settings && export PYTHONPATH=$PYTHONPATH:. && uv run pytest"
        language: system
        pass_filenames: false
        always_run: true

      - id: jest
        name: jest
        entry: bash -c "export PATH=$HOME/.local/bin:$HOME/.bun/bin:$PATH && cd web && bun test"
        language: system
        pass_filenames: false
        always_run: true

      - id: eslint
        name: eslint
        entry: bash -c "export PATH=$HOME/.local/bin:$HOME/.bun/bin:$PATH && cd web && bun run lint"
        language: system
        pass_filenames: false
        always_run: true

      - id: tsc
        name: type-check
        entry: bash -c "export PATH=$HOME/.local/bin:$HOME/.bun/bin:$PATH && cd web && bun x tsc"
        language: system
        pass_filenames: false
        always_run: true
