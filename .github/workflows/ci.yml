name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: admin
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Backend Dependencies
        run: |
          cd api
          uv pip install --system -r requirements.txt
          uv pip install --system pytest-django pytest

      - name: Install Frontend Dependencies
        run: |
          cd web
          bun install

      - name: Set up pre-commit
        run: |
          pip install pre-commit

      - name: Run pre-commit hooks
        run: |
          # Use DJANGO_SETTINGS_MODULE so pytest hook works
          export DJANGO_SETTINGS_MODULE=apps.settings
          export PYTHONPATH=$PYTHONPATH:$(pwd)/api
          pre-commit run --all-files

      - name: Run Backend Tests
        env:
          DJANGO_SETTINGS_MODULE: apps.settings
          DATABASE_URL: postgres://admin:admin@localhost:5432/admin
          REDIS_URL: redis://localhost:6379/0
          GOOGLE_API_KEY: dummy_key
        run: |
          cd api
          pytest

      - name: Run Frontend Tests
        run: |
          cd web
          bun test
