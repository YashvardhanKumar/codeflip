name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: admin
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Backend Dependencies
        run: |
          cd api
          uv sync --dev

      - name: Install Frontend Dependencies
        run: |
          cd web
          bun install

      - name: Run pre-commit hooks
        run: |
          export DJANGO_SETTINGS_MODULE=apps.settings
          export PYTHONPATH=$PYTHONPATH:$(pwd)/api
          uv run --project api pre-commit run --all-files --config .pre-commit-config.yaml

      - name: Run Frontend Lint
        run: |
          cd web
          bun run lint

      - name: Run Frontend Type Check
        run: |
          cd web
          bun x tsc

      - name: Run Backend Tests
        env:
          DJANGO_SETTINGS_MODULE: apps.settings
          POSTGRES_DB: admin
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          GOOGLE_API_KEY: dummy_key
        run: |
          cd api
          uv run pytest

      - name: Run Frontend Tests
        run: |
          cd web
          bun test

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify API Build (Development)
        run: DOCKER_TARGET=development docker compose build api

      - name: Verify API Build (Production)
        run: DOCKER_TARGET=production docker compose build api

      - name: Verify Web Build (Development)
        run: DOCKER_TARGET=development docker compose build web

      - name: Verify Web Build (Production)
        run: |
          # Use optimized build flags for CI environment
          DOCKER_TARGET=production NODE_ENV=production docker compose build web

  deploy:
    needs: [lint-and-test, docker-build-check]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd coderacer-web
            git pull origin master
            chmod +x scripts/optimize-deploy.sh
            ./scripts/optimize-deploy.sh
