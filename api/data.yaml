- model: problem.discuss
  pk: 1
  fields:
    author: 3
    problem: 1
    title: O(N) Two-Pass Hash Map via Complement Mapping
    body: "# Intuition\r\nTo find two numbers that sum to a given `target`, we can
      reframe the search mathematically. For any number $x$ in the array, we are looking
      for its complement $y$ such that:\r\n$$x + y = \\text{target} \\implies y =
      \\text{target} - x$$\r\n\r\nThe naive brute-force approach of checking every
      pair takes $O(n^2)$ time. To optimize this, we can trade a small amount of memory
      for speed. By utilizing a hash map, we can index the elements (or their required
      complements) as we traverse the array, allowing us to perform complement lookups
      in $O(1)$ average time.\r\n\r\n# Approach\r\nThis solution implements a **two-pass
      hash map** approach:\r\n\r\n1. **First Pass (Mapping Complements):**\r\n   We
      traverse the array and construct a hash map `mp`. For each element `nums[i]`,
      we calculate its required complement to reach the target, `target - nums[i]`,
      and store it as the key, mapping it to the current index `i`:\r\n   $$\\text{mp}[\\text{target}
      - \\text{nums}[i]] = i$$\r\n   *(Note: If duplicate keys occur, the map will
      store the latest index, which remains safe and valid for this problem's constraints).*\r\n\r\n2.
      **Second Pass (Finding the Match):**\r\n   We iterate through the array a second
      time. For each element `nums[i]`, we check if it exists as a key in our map.
      If it does, it means some index `mp[nums[i]]` needs `nums[i]` to complete its
      sum to `target`.\r\n   \r\n3. **Collision Avoidance:**\r\n   We must ensure
      we do not use the exact same element twice. We handle this by checking that
      the matched index is not equal to the current index (`mp[nums[i]] != i`). Once
      a valid pair is verified, we return their indices `{i, mp[nums[i]]}`.\r\n\r\n#
      Complexity\r\n- **Time Complexity:** $\\mathcal{O}(n)$\r\n  We perform two sequential
      passes over the array of size $n$. Since average-case operations (insertions
      and lookups) on `std::unordered_map` are $\\mathcal{O}(1)$, the overall time
      complexity is linear.\r\n\r\n- **Space Complexity:** $\\mathcal{O}(n)$\r\n  In
      the worst case, we store up to $n$ key-value pairs in our hash map, requiring
      linear auxiliary memory.\r\n\r\n# Code\r\n```cpp\r\nclass Solution {\r\npublic:\r\n
      \   vector<int> twoSum(vector<int>& nums, int target) {\r\n        unordered_map<int,
      int> mp;\r\n        for(int i = 0; i < nums.size(); i++) {\r\n            mp[target
      - nums[i]] = i;\r\n        }\r\n        for(int i = 0; i < nums.size(); i++)
      {\r\n            if(mp.find(nums[i]) != mp.end() && mp[nums[i]] != i) {\r\n
      \               return {i, mp[nums[i]]};\r\n            }\r\n        }\r\n        return
      {-1, -1};\r\n    }\r\n};\r\n```"
    user: 3
    views: 30
    is_editorial: true
    created_at: 2026-05-31 21:48:41.363911+00:00
    upvotes: []
    downvotes: []
