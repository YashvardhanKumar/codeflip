    user: 3
    problem: 1
    code: "class Solution {\r\npublic:\r\n    vector<int> twoSum(vector<int>& nums,
      int target) {\r\n        unordered_map<int, int> mp;\r\n        for(int i =
      0; i < nums.size(); i++) {\r\n            mp[target - nums[i]] = i;\r\n        }\r\n
      \       for(int i = 0; i < nums.size(); i++) {\r\n            if(mp.find(nums[i])
      != mp.end() && mp[nums[i]] != i) {\r\n                return {i, mp[nums[i]]};\r\n
      \           }\r\n        }\r\n        return {-1, -1};\r\n    }\r\n};"
