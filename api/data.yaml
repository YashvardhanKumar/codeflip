- model: problem.problem
  pk: 1
  fields:
    name: Two Sum
    problem_description: "<p>Given an array of integers&nbsp;<code>nums</code>&nbsp;and
      an integer&nbsp;<code>target</code>, return&nbsp;<em>indices of the two numbers
      such that they add up to&nbsp;<code>target</code></em>.</p>\r\n\r\n<p>You may
      assume that each input would have&nbsp;<strong><em>exactly</em>&nbsp;one solution</strong>,
      and you may not use the&nbsp;<em>same</em>&nbsp;element twice.</p>\r\n\r\n<p>You
      can return the answer in any order.</p>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Example
      1:</strong></p>\r\n\r\n<pre>\r\n<strong>Input:</strong> nums = [2,7,11,15],
      target = 9\r\n<strong>Output:</strong> [0,1]\r\n<strong>Explanation:</strong>
      Because nums[0] + nums[1] == 9, we return [0, 1].\r\n</pre>\r\n\r\n<p><strong>Example
      2:</strong></p>\r\n\r\n<pre>\r\n<strong>Input:</strong> nums = [3,2,4], target
      = 6\r\n<strong>Output:</strong> [1,2]\r\n</pre>\r\n\r\n<p><strong>Example 3:</strong></p>\r\n\r\n<pre>\r\n<strong>Input:</strong>
      nums = [3,3], target = 6\r\n<strong>Output:</strong> [0,1]\r\n</pre>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Constraints:</strong></p>\r\n\r\n<ul
      style=\"margin-left:16px; margin-right:16px\">\r\n\t<li><code>2 &lt;= nums.length
      &lt;=&nbsp;<span class=\"math-tex\">\\(10^4\\)</span></code></li>\r\n\t<li><code>-<span
      class=\"math-tex\">\\(10^9\\)</span> &lt;= nums[i] &lt;= </code><code><span
      class=\"math-tex\">\\(10^9\\)</span></code></li>\r\n\t<li><code>-<code><span
      class=\"math-tex\">\\(10^9\\)</span></code> &lt;= target &lt;= </code><code><span
      class=\"math-tex\">\\(10^9\\)</span></code></li>\r\n\t<li><strong>Only one valid
      answer exists.</strong></li>\r\n</ul>\r\n\r\n<p>&nbsp;</p>\r\n\r\n<p><strong>Follow-up:&nbsp;</strong>Can
      you come up with an algorithm that is less than&nbsp;<code><span class=\"math-tex\">\\(O(n^2)\\)</span></code>&nbsp;time
      complexity?</p>"
    difficulty: EASY
    created_at: 2025-12-26 12:19:52.698840+00:00
